<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Lab 4 - Canvas (A Minha Casa)</title>
    <style>
        body {
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        canvas {
            background-color: white;
            border: 2px solid #333; 
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>A Minha Paisagem em Canvas</h1>
    
    <canvas id="meuCanvas" width="300" height="300"></canvas>

    <script>
        const canvas = document.getElementById("meuCanvas");
        const ctx = canvas.getContext("2d");

        ctx.fillStyle = "#9df1d4";
        ctx.fillRect(0, 0, 300, 300);
        ctx.fillStyle = "#ffff33";
        ctx.beginPath();
        ctx.arc(240, 70, 35, 0, 2 * Math.PI);
        ctx.fill();
        ctx.fillStyle = "#8a8a8a";
        ctx.fillRect(0, 220, 300, 80);
        ctx.fillStyle = "#4a8efa";
        ctx.beginPath();
        ctx.moveTo(0, 180);
        ctx.quadraticCurveTo(50, 180, 50, 250);
        ctx.quadraticCurveTo(150, 300, 150, 300);
        ctx.lineTo(0, 300);
        ctx.fill();
        ctx.fillStyle = "#8b5a2b"; 
        ctx.fillRect(110, 140, 80, 80); 
        ctx.fillStyle = "#fa604a"; 
        ctx.beginPath();
        ctx.moveTo(110, 140);
        ctx.lineTo(150, 90);
        ctx.lineTo(190, 140);
        ctx.fill();
        ctx.fillStyle = "#5cacee";
        ctx.fillRect(118, 160, 20, 20);
        ctx.fillRect(162, 160, 20, 20);
        ctx.fillStyle = "#4d3016";
        ctx.fillRect(140, 180, 20, 40);
        ctx.fillStyle = "#704116";
        ctx.fillRect(40, 185, 12, 35);
        ctx.fillStyle = "#3b8e30";
        ctx.beginPath();
        ctx.arc(46, 170, 20, 0, 2 * Math.PI);
        ctx.fill();
        ctx.fillStyle = "#704116";
        ctx.fillRect(250, 210, 12, 35);
        ctx.fillStyle = "#3b8e30";
        ctx.beginPath();
        ctx.arc(256, 195, 20, 0, 2 * Math.PI);
        ctx.fill();

    </script>
</body>
</html>
