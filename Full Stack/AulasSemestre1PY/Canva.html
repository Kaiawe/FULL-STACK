<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Canvas - Meu Portfólio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Borda apenas para visualizar os limites do Canvas */
        canvas {
            border: 1px solid black;
            background-color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <nav id="menu-principal">
        <a href="Lab1.html" class="link-menu">Página Inicial</a>
        <a href="Lab1ProjectsPage.html" class="link-menu">Projetos</a>
    </nav>

    <div id="conteudo">
        <h1>O meu Desenho Canvas</h1>
        
        <canvas id="meuCanvas" width="300" height="300"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("meuCanvas");
        const ctx = canvas.getContext("2d");

        // 1. Função para desenhar quadrados
        function desenhar_quadrado(x, y, largura, altura, cor) {
            ctx.fillStyle = cor;
            ctx.fillRect(x, y, largura, altura);
        }

        // 2. Função para desenhar linhas
        function desenhar_linha(x1, y1, x2, y2, cor) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = cor;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        // 3. Função para desenhar arcos
        function desenhar_arco(x, y, raio, anguloInicial, anguloFinal, corLinha) {
            ctx.beginPath();
            ctx.arc(x, y, raio, anguloInicial, anguloFinal);
            ctx.strokeStyle = corLinha;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        // 4. Função para escrever texto
        function escrever(texto, x, y, cor) {
            ctx.fillStyle = cor;
            ctx.font = "20px Arial";
            ctx.fillText(texto, x, y);
        }

        // --- Desenhar a figura aproximada ao modelo anexo ---

        // Linha divisória horizontal (Verde) e vertical (Cinza)
        desenhar_linha(0, 150, 300, 150, "green");
        desenhar_linha(150, 150, 150, 300, "gray");

        // Linhas diagonais a partir dos quadrados (Azul e Vermelha)
        desenhar_linha(50, 50, 150, 150, "blue");
        desenhar_linha(250, 50, 150, 150, "red");

        // Arcos centrais superiores (Verdes)
        desenhar_arco(150, 150, 40, Math.PI, 2 * Math.PI, "green");
        desenhar_arco(150, 150, 70, Math.PI, 2 * Math.PI, "green");

        // Arcos inferiores (Verdes)
        desenhar_arco(150, 300, 60, Math.PI, 2 * Math.PI, "green");

        // Desenhar Quadrados nos cantos (Azul e Vermelho)
        desenhar_quadrado(0, 0, 50, 50, "blue");   // Canto Superior Esquerdo
        desenhar_quadrado(250, 0, 50, 50, "red");  // Canto Superior Direito
        
        // Quadrado Vermelho central
        desenhar_quadrado(110, 150, 40, 40, "red");

        // Detalhes em Ciano
        desenhar_quadrado(0, 120, 30, 60, "cyan"); // Ciano na borda esquerda
        
        // Canto Inferior Esquerdo (L Amarelo feito com dois retângulos)
        desenhar_quadrado(0, 250, 30, 50, "yellow");
        desenhar_quadrado(30, 270, 30, 30, "yellow");

        // Canto Inferior Direito (L Preto feito com dois retângulos)
        desenhar_quadrado(270, 240, 30, 60, "black");
        desenhar_quadrado(240, 270, 30, 30, "black");

        // O Texto no centro do topo
        escrever("Canvas", 115, 60, "black");
    </script>
</body>
</html>
